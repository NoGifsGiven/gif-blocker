<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #333;
      margin: 0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 16px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider {
      background: #4caf50;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(20px);
    }
    .info {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #888;
    }

    /* Shared list styles */
    .section-label {
      font-weight: 600;
      font-size: 13px;
      margin: 12px 0 6px;
      padding-top: 10px;
      border-top: 1px solid #eee;
    }
    .section-label .site-name {
      font-weight: 400;
      color: #666;
    }
    .add-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .add-row input {
      flex: 1;
      padding: 5px 8px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 4px;
      outline: none;
    }
    .add-row input:focus {
      border-color: #4caf50;
    }
    .add-row button {
      padding: 5px 10px;
      font-size: 13px;
      background: #4caf50;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }
    .add-row button:hover {
      background: #43a047;
    }
    .item-list {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 140px;
      overflow-y: auto;
    }
    .item-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 13px;
      border-bottom: 1px solid #f0f0f0;
    }
    .item-list li:last-child {
      border-bottom: none;
    }
    .item-list .item-text {
      font-family: "SF Mono", "Consolas", "DejaVu Sans Mono", monospace;
      font-size: 12px;
      word-break: break-all;
    }
    .item-list .remove-btn {
      background: none;
      border: none;
      color: #d32f2f;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0 4px;
      flex-shrink: 0;
    }
    .item-list .remove-btn:hover {
      color: #b71c1c;
    }
    .empty-msg {
      font-size: 12px;
      color: #aaa;
      font-style: italic;
      padding: 4px 0;
    }

    /* Tab bar for CSS section */
    .tab-bar {
      display: flex;
      gap: 0;
      margin-bottom: 8px;
      border-bottom: 2px solid #eee;
    }
    .tab-bar button {
      flex: 1;
      padding: 5px 4px;
      font-size: 12px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      color: #888;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-bar button.active {
      color: #333;
      border-bottom-color: #4caf50;
      font-weight: 600;
    }
    .tab-bar button:hover {
      color: #333;
    }
    .tab-panel {
      display: none;
    }
    .tab-panel.active {
      display: block;
    }
  </style>
</head>
<body>
  <h2>PWA GIF Blocker</h2>

  <div class="row">
    <span>Enabled</span>
    <label class="toggle">
      <input type="checkbox" id="enabled">
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">
    <span>PWA windows only</span>
    <label class="toggle">
      <input type="checkbox" id="pwaOnly">
      <span class="slider"></span>
    </label>
  </div>

  <!-- Blocked domains -->
  <div class="section-label">Blocked sites (videos &amp; animations)</div>
  <div class="add-row">
    <input type="text" id="domainInput" placeholder="e.g. example.com">
    <button id="addDomainBtn">Add</button>
  </div>
  <ul class="item-list" id="domainList"></ul>

  <!-- Blocked CSS classes -->
  <div class="section-label">
    Blocked CSS classes
    <span class="site-name" id="cssSiteLabel"></span>
  </div>

  <div class="tab-bar" id="cssTabBar">
    <button class="active" data-tab="site">This site</button>
    <button data-tab="global">All sites</button>
  </div>

  <!-- Per-site tab -->
  <div class="tab-panel active" id="tab-site">
    <div class="add-row">
      <input type="text" id="classInputSite" placeholder="e.g. video-player">
      <button id="addClassSiteBtn">Add</button>
    </div>
    <ul class="item-list" id="classListSite"></ul>
  </div>

  <!-- Global tab -->
  <div class="tab-panel" id="tab-global">
    <div class="add-row">
      <input type="text" id="classInputGlobal" placeholder="e.g. ad-banner">
      <button id="addClassGlobalBtn">Add</button>
    </div>
    <ul class="item-list" id="classListGlobal"></ul>
  </div>

  <div class="info">
    GIF images are blocked on all sites. Videos and animations are
    blocked on listed domains. CSS classes are hidden with
    <code>display:none</code>. Use "All sites" for classes that
    apply everywhere.
  </div>

  <script src="popup.js"></script>
</body>
</html>
